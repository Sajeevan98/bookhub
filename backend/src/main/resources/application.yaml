spring:
  application:
    name: bookhub

  datasource:
    url: jdbc:postgresql://localhost:5432/bookhub
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.SQL: debug

server:
  port: 8081

payhere:
  merchant-id: ${MERCHANT_ID}
  merchant-secret: ${MERCHANT_SECRET}
  currency: LKR
  checkout-url: https://sandbox.payhere.lk/pay/checkout
  return-url: http://localhost:5173/payment/success
  cancel-url: http://localhost:5173/payment/cancel
  notify-url: https://${NGROK_FREE_APP}/api/v1/payments/webhook/payhere
